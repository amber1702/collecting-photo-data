<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Collecting Photo Data
    </title>

    <link
        rel="stylesheet"
        href="style.css">

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>

<body>

<div class="container">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <div class="header">

        <div>

            <h1>
                Collecting Photo Data
            </h1>

            <p class="subtitle">
                Indoor Semantic Mapping Dataset Collection
            </p>

        </div>

        <!-- Small Compass -->

        <div class="compass-small">

            <div class="compass">

                <div
                    class="compass-arrow"
                    id="compassArrow">
                </div>

                <div class="compass-center"></div>

                <div
                    class="heading-value"
                    id="headingValue">
                    --
                </div>

                <div class="north">N</div>
                <div class="east">E</div>
                <div class="south">S</div>
                <div class="west">W</div>

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- Camera -->
    <!-- ========================= -->

    <video

        id="video"

        autoplay

        muted

        playsinline>

    </video>

    <canvas id="canvas"></canvas>

    <!-- ========================= -->
    <!-- Current Milestone -->
    <!-- ========================= -->

    <div class="milestone-card">

        <div class="label">

            Current Milestone

        </div>

        <div

            id="milestoneName"

            class="milestone-name">

            Not Created

        </div>

    </div>

    <!-- ========================= -->
    <!-- Information -->
    <!-- ========================= -->

    <div class="info-grid">

        <div class="info-item">

            <span class="material-symbols-outlined">

                location_on

            </span>

            <label>Lat</label>

            <p id="lat">--</p>

        </div>

        <div class="info-item">

            <span class="material-symbols-outlined">

                explore

            </span>

            <label>Lon</label>

            <p id="lon">--</p>

        </div>

        <div class="info-item">

            <span class="material-symbols-outlined">

                navigation

            </span>

            <label>Heading</label>

            <p id="heading">--</p>

        </div>

        <div class="info-item">

            <span class="material-symbols-outlined">

                near_me

            </span>

            <label>Dir</label>

            <p id="direction">--</p>

        </div>

    </div>

    <!-- ========================= -->
    <!-- Buttons -->
    <!-- ========================= -->

    <div class="button-group">

        <button

            id="newMilestone"

            class="orange">

            <span class="material-symbols-outlined">

                create_new_folder

            </span>

            New Milestone

        </button>

        <button

            id="capture"

            class="blue">

            <span class="material-symbols-outlined">

                photo_camera

            </span>

            Capture

        </button>

    </div>

    <!-- ========================= -->
    <!-- Status -->
    <!-- ========================= -->

    <div class="status-card">

        <label>

            Status

        </label>

        <p id="status">

            Ready

        </p>

    </div>

        <button id="enableCompass" class="orange">

        <span class="material-symbols-outlined">

            explore

        </span>

        Enable Compass

    </button>

    <!-- ========================= -->
    <!-- Footer -->
    <!-- ========================= -->

    <footer>

        <hr>

        <p>

            Developed by

            <strong>

                Le Doan Minh Thu

            </strong>

        </p>

        <p>

            School of Electrical Engineering

            <br>

            International University - VNU HCM

        </p>

    </footer>

</div>

<script src="script.js"></script>

</body>

</html>
