<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Collecting Photo Data</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>

<body>

    <div class="header">

        <div class="title-section">

            <h1>Collecting Photo Data</h1>

            <p class="subtitle">
                Indoor Semantic Mapping Dataset Collection
            </p>

        </div>

        <div class="mini-compass">

            <div class="compass">

                <div
                    class="compass-arrow"
                    id="compassArrow">
                </div>

                <div class="compass-center"></div>

                <div
                    class="heading-value"
                    id="headingValue">
                    --
                </div>

                <div class="north">N</div>
                <div class="east">E</div>
                <div class="south">S</div>
                <div class="west">W</div>

            </div>

        </div>

    </div>

    <video
        id="video"
        autoplay
        muted
        playsinline>
    </video>

    <canvas id="canvas"></canvas>

        <!-- GPS + Heading -->

        <div class="info">

            <div class="card">

                <span class="material-symbols-outlined">
                    location_on
                </span>

                <label>Lat</label>

                <span id="lat">--</span>

            </div>

            <div class="card">

                <span class="material-symbols-outlined">
                    explore
                </span>

                <label>Lon</label>

                <span id="lon">--</span>

            </div>

            <div class="card">

                <span class="material-symbols-outlined">
                    navigation
                </span>

                <label>Heading</label>

                <span id="heading">--</span>

            </div>

            <div class="card">

                <span class="material-symbols-outlined">
                    near_me
                </span>

                <label>Direction</label>

                <span id="direction">--</span>

            </div>

        </div>



        <!-- Buttons -->

        <div class="button-row">

            <button id="enableCompass">

                <span class="material-symbols-outlined">
                    explore
                </span>

                Enable Compass

            </button>

            <button id="capture">

                <span class="material-symbols-outlined">
                    photo_camera
                </span>

                Capture Photo

            </button>

        </div>

        <!-- Footer -->

        <footer>

            <hr>

            <p>

                Developed by

                <strong>Le Doan Minh Thu</strong>

            </p>

            <p>

                Faculty of Electrical Engineering<br>

                International University - VNU HCM

            </p>

        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
